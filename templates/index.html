<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Crop Recommendation System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="container">
        <header>
            <h1>AI-Based Crop Recommender</h1>
            <p>Smart Farming for a Sustainable Future</p>
        </header>

        <main>
            <div class="card form-card">
                <h2>Enter Soil & Climate Data</h2>
                <form id="predictionForm">
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="N">Nitrogen (N)</label>
                            <input type="number" id="N" name="N" placeholder="e.g. 90" required min="0" step="0.1">
                        </div>
                        <div class="input-group">
                            <label for="P">Phosphorus (P)</label>
                            <input type="number" id="P" name="P" placeholder="e.g. 42" required min="0" step="0.1">
                        </div>
                        <div class="input-group">
                            <label for="K">Potassium (K)</label>
                            <input type="number" id="K" name="K" placeholder="e.g. 43" required min="0" step="0.1">
                        </div>
                        <div class="input-group">
                            <label for="temperature">Temperature (°C)</label>
                            <input type="number" id="temperature" name="temperature" placeholder="e.g. 20.8" required step="0.1">
                        </div>
                        <div class="input-group">
                            <label for="humidity">Humidity (%)</label>
                            <input type="number" id="humidity" name="humidity" placeholder="e.g. 82.0" required min="0" max="100" step="0.1">
                        </div>
                        <div class="input-group">
                            <label for="ph">Soil pH</label>
                            <input type="number" id="ph" name="ph" placeholder="e.g. 6.5" required min="0" max="14" step="0.1">
                        </div>
                        <div class="input-group">
                            <label for="rainfall">Rainfall (mm)</label>
                            <input type="number" id="rainfall" name="rainfall" placeholder="e.g. 202.9" required min="0" step="0.1">
                        </div>
                    </div>
                    <button type="submit" id="submitBtn">Get Recommendation</button>
                </form>
            </div>

            <div id="resultCard" class="card result-card hidden">
                <h2>Recommended Crop</h2>
                <div class="result-content">
                    <div class="crop-icon">🌱</div>
                    <h3 id="cropName">--</h3>
                    <p id="recommendationText">Based on your input, this crop is the most suitable for cultivation.</p>
                </div>
                <button id="resetBtn" class="secondary-btn">Check Another</button>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 AI Crop System. Built for Farmers.</p>
        </footer>
    </div>
    
    <script src="/static/js/script.js"></script>
</body>
</html>
